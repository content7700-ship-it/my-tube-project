<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyaw Pyaw Gyi</title>
    
    <script src="https://pl30100429.effectivecpmnetwork.com/dd/4a/29/dd4a29f4a7baef1498ffd21b65723a80.js"></script>

    <script src="https://pl30100431.effectivecpmnetwork.com/a3/42/18/a342185a9216886bb85c2db826ac16d9.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #111; color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Header */
        header { background-color: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #ffcc00; position: sticky; top: 0; z-index: 100; }
        .logo { color: #ffcc00; font-size: 24px; font-weight: bold; cursor: pointer; }
        .search-box { display: flex; gap: 5px; width: 50%; max-width: 400px; }
        .search-box input { width: 100%; padding: 8px; border: none; border-radius: 4px; background: #333; color: #fff; }
        .search-box button { padding: 8px 15px; border: none; background: #ffcc00; color: #000; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Ads Layout Styling */
        .ad-sidebar { width: 100%; text-align: center; margin-top: 20px; padding: 10px; background: #222; border-radius: 4px; border: 1px solid #333; }

        /* Container */
        .container { display: flex; flex: 1; position: relative; }
        
        /* Sidebar */
        aside { width: 220px; background-color: #1a1a1a; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        aside button { background: none; border: none; color: #bbb; text-align: left; padding: 10px; font-size: 16px; cursor: pointer; border-radius: 4px; }
        aside button:hover, aside button.active { background: #333; color: #ffcc00; font-weight: bold; }

        /* Main Content */
        main { flex: 1; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        /* Video Card */
        .card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; position: relative; border: 1px solid #333; }
        .card:hover { transform: scale(1.03); border-color: #ffcc00; }
        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; font-size: 12px; border-radius: 4px; color: #ffcc00; }
        .info { padding: 10px; }
        .video-title { font-size: 14px; font-weight: bold; line-height: 1.4; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 5px; }
        .views { font-size: 12px; color: #888; }

        /* Watch Section */
        #watchSection { display: none; width: 100%; max-width: 900px; margin: 0 auto; }
        .back-btn { background: #333; color: #ffcc00; border: 1px solid #ffcc00; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .watch-title { font-size: 20px; font-weight: bold; margin-top: 15px; color: #ffcc00; }

        /* Load More */
        .load-more-btn { display: block; width: 200px; margin: 30px auto; padding: 12px; background: #ffcc00; color: #000; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; }

        /* Modal Popup */
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #222; border: 2px solid #ffcc00; padding: 25px; border-radius: 8px; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(255,204,0,0.3); }
        .modal-content h2 { color: #ffcc00; margin-bottom: 15px; }
        .modal-content p { font-size: 16px; line-height: 1.6; margin-bottom: 20px; color: #e0e0e0; }
        .modal-content button { background: #ffcc00; color: #000; border: none; padding: 10px 30px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            aside { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; }
            aside button { shrink: 0; white-space: nowrap; }
            .search-box { width: 60%; }
        }
    </style>
</head>
<body>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <h2>⚠️ သတိပေးချက်</h2>
            <p>ဗီဒီယိုများ ချောမွေ့စွာကြည့်ရှုနိုင်ရန် VPN (Singapore သို့မဟုတ် USA) ကျော်ပြီးမှ ကြည့်ရှုပေးပါရန် မေတ္တာရပ်ခံအပ်ပါသည်။</p>
            <button id="agreeBtn">သဘောတူပါသည်</button>
        </div>
    </div>

    <header>
        <div class="logo" onclick="goHome()">Pyaw Pyaw Gyi</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ရှာဖွေရန်...">
            <button onclick="handleSearch()">ရှာပါ</button>
        </div>
    </header>

    <div class="container">
        <aside>
            <button onclick="filterCategory('myanmar', this)" class="active">မြန်မာကားများ</button>
            <button onclick="filterCategory('burmese subtitles', this)">မြန်မာစာတန်းထိုး</button>
            <button onclick="filterCategory('asian', this)">အာရှ</button>
            <button onclick="filterCategory('japanese', this)">ဂျပန်</button>
            <button onclick="filterCategory('milf', this)">မမများ</button>
            <button onclick="filterCategory('amateur', this)">အပျော်တမ်း</button>
            
            <div class="ad-sidebar">
                <script async="async" data-cfasync="false" src="https://pl30100430.effectivecpmnetwork.com/f7c652d11d8596df608e6f93212b815b/invoke.js"></script>
                <div id="container-f7c652d11d8596df608e6f93212b815b"></div>
            </div>
        </aside>

        <main>
            <div id="gallerySection">
                <div class="grid" id="videoGrid"></div>
                <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">နောက်ထပ်ကြည့်ရန်</button>
            </div>

            <div id="watchSection">
                <button class="back-btn" onclick="goHome()">← နောက်သို့ပြန်သွားရန်</button>
                <div class="player-container">
                    <iframe id="videoPlayer" allowfullscreen></iframe>
                </div>
                <div class="watch-title" id="videoTitle"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'https://www.eporner.com/api/v2/video/search/';
        let page = 1;
        let currentQuery = 'myanmar';
        const perPage = 24;

        const videoGrid = document.getElementById('videoGrid');
        const gallerySection = document.getElementById('gallerySection');
        const watchSection = document.getElementById('watchSection');
        const videoPlayer = document.getElementById('videoPlayer');
        const videoTitle = document.getElementById('videoTitle');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        async function fetchVideos(query = 'myanmar', append = false) {
            if (!append) { page = 1; videoGrid.innerHTML = '<p style="padding:20px;">ဗီဒီယိုများ ဆွဲယူနေပါသည်...</p>'; }
            try {
                const searchKeyword = query ? query : 'myanmar';
                const url = `${API_BASE}?query=${encodeURIComponent(searchKeyword)}&per_page=${perPage}&page=${page}&thumbsize=big`;
                const res = await fetch(url);
                const data = await res.json();

                if (!append) videoGrid.innerHTML = '';

                if (data && data.videos && data.videos.length > 0) {
                    renderCards(data.videos);
                    loadMoreBtn.style.display = 'block';
                } else {
                    if (!append) videoGrid.innerHTML = '<p style="padding:20px;">ဗီဒီယို ရှာမတွေ့ပါ။</p>';
                    loadMoreBtn.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                if (!append) videoGrid.innerHTML = '<p style="padding:20px; color:red;">Error: အချက်အလက်ယူလို့မရပါ။ VPN ဖွင့်ထားဖို့ လိုအပ်ပါသည်။</p>';
            }
        }

        function renderCards(videos) {
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgUrl = v.default_thumb ? v.default_thumb.src : (v.thumbs && v.thumbs.length > 0 ? v.thumbs[0].src : '');

                card.innerHTML = `
                    <div class="thumb-container">
                        <img src="${imgUrl}" alt="${v.title}" loading="lazy">
                        <span class="duration">${v.length_min || '00'}:${v.length_sec || '00'}</span>
                    </div>
                    <div class="info">
                        <div class="video-title">${v.title}</div>
                        <div class="views">👁️ ${parseInt(v.views).toLocaleString()} ကြည့်ရှုသူ</div>
                    </div>
                `;
                card.onclick = () => openWatchPage(v.embed, v.title);
                videoGrid.appendChild(card);
            });
        }

        function openWatchPage(embedUrl, title) {
            gallerySection.style.display = 'none';
            watchSection.style.display = 'block';
            videoPlayer.src = embedUrl;
            videoTitle.innerText = title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goHome() {
            watchSection.style.display = 'none';
            videoPlayer.src = '';
            gallerySection.style.display = 'block';
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentQuery = cat;
            goHome();
            fetchVideos(currentQuery, false);
        }

        function handleSearch() {
            const val = document.getElementById('searchInput').value.trim();
            currentQuery = val;
            goHome();
            fetchVideos(currentQuery, false);
        }

        function loadMore() {
            page++;
            fetchVideos(currentQuery, true);
        }

        const entryModal = document.getElementById('entryModal');
        const agreeBtn = document.getElementById('agreeBtn');
        const seen = localStorage.getItem('pyawpyawgyi:entry_agree');

        if (seen) { entryModal.style.display = 'none'; }

        agreeBtn.addEventListener('click', () => {
            localStorage.setItem('pyawpyawgyi:entry_agree', '1');
            entryModal.style.display = 'none';
        });

        fetchVideos('myanmar', false);
    </script>
</body>
</html>
