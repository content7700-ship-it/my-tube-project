<!doctype html>
<html lang="my">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pyaw Pyaw Gyi - ဗီဒီယိုများ</title>
	<meta name="description" content="Pyaw Pyaw Gyi - Premium Dark Video Streaming (မြန်မာ) - GitHub Pages optimized single-file app">
	<style>
		:root{
			--bg:#0b0b0b;
			--panel:#0f0f11;
			--muted:#9aa0a6;
			--accent-gold:#ffd700;
			--accent-red:#ff3b30;
			--glass: rgba(255,255,255,0.03);
		}
		*{box-sizing:border-box}
		html,body{height:100%;margin:0;background:linear-gradient(180deg,#040404 0%, #0b0b0b 100%);color:#e6e6e6;font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Noto Sans Myanmar", sans-serif}
		a{color:inherit;text-decoration:none}
		header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(90deg, rgba(255,215,0,0.06), rgba(255,69,0,0.03));backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,0.03)}
		.logo{display:flex;gap:12px;align-items:center;font-weight:700;font-size:20px;color:var(--accent-gold)}
		.logo .brand{font-family:Georgia, serif}
		.controls{display:flex;gap:12px;align-items:center}
		.search{display:flex;align-items:center;background:var(--panel);border-radius:8px;padding:6px 8px;border:1px solid rgba(255,255,255,0.03)}
		.search input{background:transparent;border:0;outline:none;color:inherit;padding:8px 6px;width:320px;min-width:120px}
		.btn{background:linear-gradient(90deg,var(--accent-gold),var(--accent-red));color:#0a0a0a;padding:8px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:600}
		.icon-btn{background:transparent;border:0;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px}
		.container{display:grid;grid-template-columns:260px 1fr;gap:20px;padding:18px;max-width:1200px;margin:18px auto}
		.sidebar{background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.02)}
		.category{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
		.category a{display:block;padding:10px;border-radius:8px;color:var(--muted);font-weight:600}
		.category a:hover{background:var(--glass);color:var(--accent-gold)}
		main{min-height:70vh}
		.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
		.card{background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);border-radius:10px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,0.02);cursor:pointer}
		.thumb{width:100%;height:0;padding-bottom:56%;background-size:cover;background-position:center}
		.meta{padding:10px}
		.title{font-size:14px;line-height:1.2;color:#eaeaea;height:2.6em;overflow:hidden}
		.overlay{position:absolute;left:8px;top:8px;background:rgba(0,0,0,0.6);padding:4px 6px;border-radius:6px;font-size:12px;color:#fff}
		.views{position:absolute;right:8px;bottom:8px;background:linear-gradient(90deg,var(--accent-gold),var(--accent-red));padding:6px 8px;border-radius:8px;font-size:12px;color:#060606;font-weight:700}
		.play-icon{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.06)}
		.controls .mobile-toggle{display:none}
		.load-more{display:block;margin:18px auto;padding:10px 16px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);cursor:pointer}
		.player-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px;opacity:0;pointer-events:none;transition:opacity .18s}
		.player-modal.open{opacity:1;pointer-events:auto}
		.player-box{width:100%;max-width:1000px;background:var(--panel);border-radius:12px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.6)}
		.player-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.02)}
		.close{background:transparent;border:0;color:var(--muted);cursor:pointer}
		iframe{width:100%;height:560px;border:0;background:#000}
		.empty{padding:40px;text-align:center;color:var(--muted)}
		.spinner{width:36px;height:36px;border-radius:50%;border:4px solid rgba(255,255,255,0.06);border-top-color:var(--accent-gold);animation:spin 1s linear infinite;margin:auto}
		@keyframes spin{to{transform:rotate(360deg)}}
		@media(max-width:980px){.grid{grid-template-columns:repeat(3,1fr)}.container{grid-template-columns:1fr;padding:12px}}
		@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}.search input{width:140px}.controls .mobile-toggle{display:inline-block}.sidebar{display:none}.logo{font-size:18px}.player-box iframe{height:320px}}
	</style>
</head>
<body>
	<header>
		<div class="logo"><div class="brand">Pyaw Pyaw Gyi</div><div style="font-size:12px;color:var(--muted)">ဗီဒီယိုများ</div></div>
		<div class="controls">
			<form id="searchForm" class="search" role="search">
				<input id="searchInput" placeholder="ရှာရန်... (နာမည်၊ အမျိုးအစား)" aria-label="search">
				<button class="icon-btn" type="submit">🔍</button>
			</form>
			<button id="mobileMenu" class="icon-btn mobile-toggle">☰</button>
		</div>
	</header>

	<div class="container">
		<aside class="sidebar">
			<nav>
				<ul class="category">
					<li><a href="#" data-keyword="လတ်တလောအသစ်များ">လတ်တလောအသစ်များ</a></li>
					<li><a href="#" data-keyword="လူကြိုက်အများဆုံး">လူကြိုက်အများဆုံး</a></li>
					<li><a href="#" data-keyword="အာရှ">အာရှ</a></li>
					<li><a href="#" data-keyword="ဥရောပ">ဥရောပ</a></li>
					<li><a href="#" data-keyword="ကာတွန်း">ကာတွန်း/Chibi</a></li>
					<li><a href="#" data-keyword="ဂိမ်း">ဂိမ်း</a></li>
					<li><a href="#" data-keyword="အကြောင်းအရာ">အခြား</a></li>
				</ul>
			</nav>
		</aside>

		<main>
			<div id="grid" class="grid"></div>
			<div id="loading" class="empty" style="display:none"><div class="spinner"></div></div>
			<button id="loadMore" class="load-more">အခြားများ ဖတ်ရှုရန်</button>
		</main>
	</div>

	<div id="playerModal" class="player-modal" aria-hidden="true">
		<div class="player-box">
			<div class="player-header">
				<div id="playerTitle">နမူနာ</div>
				<div>
					<button id="openInNew" class="btn" style="margin-right:8px;display:none">ပြင်ပတွင်ဖွင့်ရန်</button>
					<button id="closePlayer" class="close">✕</button>
				</div>
			</div>
			<iframe id="playerFrame" src="about:blank" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
		</div>
	</div>

	<div id="entryModal" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);z-index:80;">
		<div style="max-width:760px;background:var(--panel);padding:22px;border-radius:12px;border:1px solid rgba(255,255,255,0.03)">
			<h2 style="margin:0 0 10px;color:var(--accent-gold)">သတိပေးချက်</h2>
			<p style="color:var(--muted);line-height:1.6">သတိပေးချက် - ဗီဒီယိုများ ချောမွေ့စွာကြည့်ရှုနိုင်ရန် VPN (Singapore သို့မော့် USA) ကျော်ပြီးမှ ကြည့်ရှုပေးပါရန် မေတ္တာရပ်ခံအပ်ပါသည်။</p>
			<div style="text-align:right;margin-top:12px">
				<button id="agreeBtn" class="btn">သဘောတူပါသည်</button>
			</div>
		</div>
	</div>

	<script>
		const API_BASE = 'https://www.eporner.com/api/v2/video/search/';
		let page = 1;
		const perPage = 24;
		let currentQuery = '';

		const grid = document.getElementById('grid');
		const loadMoreBtn = document.getElementById('loadMore');
		const loadingEl = document.getElementById('loading');
		const playerModal = document.getElementById('playerModal');
		const playerFrame = document.getElementById('playerFrame');
		const playerTitle = document.getElementById('playerTitle');
		const openInNew = document.getElementById('openInNew');

		function showLoading(show){loadingEl.style.display = show ? '' : 'none'; loadMoreBtn.style.display = show ? 'none' : ''}

		async function fetchVideos(query = '', append = false){
			showLoading(true);
			try{
				const q = encodeURIComponent(query || '');
				const url = `${API_BASE}?q=${q}&page=${page}&per_page=${perPage}`;
				const res = await fetch(url);
				if(!res.ok) throw new Error('Network response not ok');
				const data = await res.json();
				const list = data.videos || data.results || data.items || [];
				if(!append) grid.innerHTML = '';
				if(!list.length && !append){grid.innerHTML = '<div class="empty">ရရှိနိုင်သည့်ဗီဒီယို မရှိပါ</div>'}
				renderCards(list);
			}catch(err){
				if(!append) grid.innerHTML = '<div class="empty">ထပ်မံအားဖြည့်ရန် အမှားတစ်ခု ဖြစ်ပွားခဲ့သည်</div>'
			}finally{showLoading(false)}
		}

		function renderCards(list){
			for(const v of list){
				const id = v.id || v.video_id || v.uid || v.key || '';
				const title = v.title || v.name || 'ဗီဒီယို';
				const thumb = v.preview || v.thumbnail || v.thumb || v.snapshots && v.snapshots[0] || '';
				const duration = v.duration_formatted || (v.duration ? formatDuration(v.duration) : v.length || '---');
				const views = v.views || v.view_count || v.stats && v.stats.views || '—';
				let embed = v.embed || v.embed_url || v.player || '';
				if(!embed && id) embed = `https://www.eporner.com/embed/${id}`;

				const card = document.createElement('article');
				card.className = 'card';
				card.innerHTML = `
					<div class="thumb" style="background-image:url('${escapeHtml(thumb)}')" data-embed="${escapeHtml(embed)}" data-title="${escapeHtml(title)}"></div>
					<div class="overlay">${escapeHtml(duration)}</div>
					<div class="play-icon">▶</div>
					<div class="meta"><div class="title">${escapeHtml(title)}</div></div>
					<div class="views">${escapeHtml(views.toString())}</div>`;
				grid.appendChild(card);
				card.querySelector('.thumb').addEventListener('click', onCardClick);
				card.querySelector('.play-icon').addEventListener('click', onCardClick);
			}
		}

		function onCardClick(e){
			const el = e.currentTarget.closest('.card').querySelector('.thumb');
			const embed = el.dataset.embed || '';
			const title = el.dataset.title || '';
			openPlayer(embed || '', title);
		}

		function openPlayer(url, title){
			if(!url){playerFrame.src = 'about:blank'; playerTitle.textContent = 'မတွေ့ပါ'; openInNew.style.display='none'}
			else{playerFrame.src = url; playerTitle.textContent = title; openInNew.style.display='inline-block'; openInNew.onclick = ()=> window.open(url,'_blank')}
			playerModal.classList.add('open'); playerModal.setAttribute('aria-hidden','false');
		}

		document.getElementById('closePlayer').addEventListener('click', ()=>{playerModal.classList.remove('open'); playerFrame.src='about:blank'; playerModal.setAttribute('aria-hidden','true')});
		window.addEventListener('keydown',(e)=>{if(e.key==='Escape'){playerModal.classList.remove('open'); playerFrame.src='about:blank'; playerModal.setAttribute('aria-hidden','true')}});

		function formatDuration(s){
			const t = Number(s)||0; const h = Math.floor(t/3600); const m = Math.floor((t%3600)/60); const sec = t%60; return (h? h+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
		}

		function escapeHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

		document.getElementById('searchForm').addEventListener('submit', (e)=>{e.preventDefault(); const q = document.getElementById('searchInput').value.trim(); currentQuery = q; page = 1; fetchVideos(currentQuery,false)});

		document.querySelectorAll('.category a').forEach(a=>a.addEventListener('click', (e)=>{e.preventDefault(); const k = a.dataset.keyword||a.textContent; document.getElementById('searchInput').value = k; currentQuery = k; page = 1; fetchVideos(currentQuery,false)}));

		loadMoreBtn.addEventListener('click', ()=>{page++; fetchVideos(currentQuery,true)});

		// Entry modal logic
		const entryModal = document.getElementById('entryModal');
		const agreeBtn = document.getElementById('agreeBtn');
		const seen = localStorage.getItem('pyawpyawgi:entry_agree');
		if(seen){entryModal.style.display='none'}
		agreeBtn.addEventListener('click', ()=>{localStorage.setItem('pyawpyawgi:entry_agree','1'); entryModal.style.display='none'});

		// Initial load
		(function(){fetchVideos('',false)})();
	</script>
</body>
</html>
